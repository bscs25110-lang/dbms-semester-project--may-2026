<!DOCTYPE html>
<html>
<head>
    <title>Records</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">

    <div class="left-nav">
        <div class="logo">Stupify</div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="records.html">Records</a></li>
            <li><a href="ReadMe.html">Read Me</a></li>
        </ul>
    </div>
<div class="dropdown">
    <button class="dropbtn">Tables ▼</button>

    <div class="dropdown-content">
        <a href="home.html">Home</a>
        <a href="products.html">Records</a>
        <a href="ReadMe.html">About</a>
    </div>
</div>
</nav>


<!-- CONTENT -->
<div class="container">

    <h1>Records</h1>

    <!-- SEARCH -->
    <form method="GET" class="search-bar">
        <input type="text" name="search" placeholder="Search product...">
        <button type="submit">Search</button>
    </form>

    <!-- TABLE -->
    <table class="product-table">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
        </tr>

        {% for p in products %}
        <tr>
            <td>{{ p[0] }}</td>
            <td>{{ p[1] }}</td>
            <td>${{ p[2] }}</td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
